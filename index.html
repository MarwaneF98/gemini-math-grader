<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Math Grader</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-color: #2563eb; 
        }

        /* GLOBAL FIXES */
        * {
            /* Kills the default blue square highlight on mobile tap */
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Prevents the rubber-band bouncy scrolling effect on mobile */
            overscroll-behavior-y: none; 
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-size: 14px;
            outline: none; /* Removes desktop focus rings */
        }

        input[type="password"]:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            outline: none; /* Removes desktop focus rings */
            
            /* MOBILE APP FIXES */
            user-select: none; /* Prevents text selection on long-press */
            -webkit-user-select: none;
            touch-action: manipulation; /* Disables double-tap-to-zoom only on the button */
        }

        button:active {
            /* Adds a slight visual push effect instead of a blue square */
            background-color: #1d4ed8; 
        }

        button:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }

        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        #result-section {
            display: none;
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        img#preview {
            max-width: 100%;
            border-radius: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            /* Prevents users from accidentally saving/dragging the image while scrolling */
            pointer-events: none; 
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            background-color: var(--container-bg);
            user-select: none;
        }

        /* Screen management */
        #grader-screen {
            display: none;
        }
    </style>
</head>
<body>

    <main>
        <div id="auth-screen" class="container">
            <h1>Access Grader</h1>
            <p class="subtitle">Please provide your Gemini API key to access the tool. Your key is only used for this session.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <input type="password" id="api-key-input" required placeholder="Enter Gemini API Key">
                </div>
                <button type="submit">Enter</button>
            </form>
        </div>

        <div id="grader-screen" class="container">
            <h1>AI Math Grader</h1>
            <p class="subtitle">Upload a photo of handwritten math to grade it.</p>
            
            <form id="grader-form">
                <div class="form-group">
                    <input type="file" id="paper-image" accept="image/*" required>
                </div>
                <button type="submit" id="submit-btn">Grade Paper</button>
            </form>

            <div id="status"></div>

            <div id="result-section">
                <img id="preview" alt="Graded Paper Preview">
                <a id="download-btn" download="graded_paper.jpg" style="text-decoration: none; display: block;">
                    <button type="button">Download Corrected Paper</button>
                </a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Marwane Farhane. All rights reserved.
    </footer>

    <script>
        let sessionApiKey = "";

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputKey = document.getElementById('api-key-input').value.trim();
            
            if (inputKey) {
                sessionApiKey = inputKey;
                
                // Hide keyboard immediately on mobile after entering key
                document.getElementById('api-key-input').blur();
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('grader-screen').style.display = 'block';
            }
        });

        document.getElementById('grader-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('paper-image');
            const statusText = document.getElementById('status');
            const submitBtn = document.getElementById('submit-btn');
            const resultSection = document.getElementById('result-section');
            
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);
            formData.append('api_key', sessionApiKey);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            statusText.textContent = 'Analyzing and grading paper...';
            resultSection.style.display = 'none';

            try {
                const response = await fetch('/api/grade', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Grading failed: ${errorMsg}`);
                }

                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);

                document.getElementById('preview').src = imageUrl;
                document.getElementById('download-btn').href = imageUrl;
                
                // Re-enable pointer events on the image preview so user can long-press to save if they want
                document.getElementById('preview').style.pointerEvents = 'auto';
                
                resultSection.style.display = 'block';
                statusText.textContent = 'Grading complete!';
                
            } catch (error) {
                console.error(error);
                statusText.textContent = error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Grade Paper';
            }
        });
    </script>
</body>
</html>
