<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Math Grader</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-color: #2563eb; 
        }

        /* 1. ABSOLUTE LOCK: Kill all browser highlight and touch actions */
        * {
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
            touch-action: none; 
        }

        /* 2. PREVENT SCROLLING */
        html, body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden; 
            min-height: 0; 
        }

        .container {
            background-color: var(--container-bg);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }

        h1 {
            margin-top: 0;
            font-size: 22px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 0;
            margin-bottom: 16px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-size: 16px; 
            outline: none; 
        }

        input[type="password"]:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            outline: none; 
            flex-shrink: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        button:active {
            background-color: #1d4ed8; 
        }

        button:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }

        /* Secondary Outline Button Style */
        button.secondary-btn {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            margin-top: 10px;
        }

        button.secondary-btn:active {
            background-color: rgba(37, 99, 235, 0.1); 
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            flex-shrink: 0;
        }

        /* 3. DYNAMIC SHRINKING */
        #result-section {
            display: none;
            flex-direction: column;
            margin-top: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            flex: 1; 
            min-height: 0; 
            overflow: hidden;
        }

        img#preview {
            width: 100%;
            flex: 1; 
            min-height: 0; 
            object-fit: contain; 
            border-radius: 4px;
            margin-bottom: 16px;
            pointer-events: none; 
        }

        #download-link {
            text-decoration: none; 
            display: block;
            flex-shrink: 0; 
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            background-color: var(--container-bg);
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        #clear-key-link {
            color: var(--accent-color);
            text-decoration: none;
            margin-left: 8px;
            cursor: pointer;
        }

        #grader-screen {
            display: none;
            height: 100%; 
        }
    </style>
</head>
<body>

    <main>
        <div id="auth-screen" class="container">
            <h1>Access Grader</h1>
            <p class="subtitle">Please provide your Gemini API key to access the tool. It will be saved securely on your device.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <input type="password" id="api-key-input" required placeholder="Enter Gemini API Key">
                </div>
                <button type="submit">Enter</button>
            </form>
        </div>

        <div id="grader-screen" class="container">
            <h1>AI Math Grader</h1>
            <p class="subtitle">Upload a photo of handwritten math to grade it.</p>
            
            <form id="grader-form">
                <div class="form-group">
                    <input type="file" id="paper-image" accept="image/*" required>
                </div>
                <button type="submit" id="submit-btn">Grade Paper</button>
            </form>

            <div id="status"></div>

            <div id="result-section">
                <img id="preview" alt="Graded Paper Preview">
                <a id="download-link" download="graded_paper.jpg">
                    <button type="button">Download Corrected Paper</button>
                </a>
                <button type="button" id="new-paper-btn" class="secondary-btn">Grade Another Paper</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Marwane Farhane. <a href="#" id="clear-key-link">Change API Key</a>
    </footer>

    <script>
        // 4. JAVASCRIPT LOCK: Aggressively block native mobile touch gestures
        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', function(event) {
            event.preventDefault();
        });

        let sessionApiKey = "";

        // CHECK MEMORY: If key exists in local storage, skip the auth screen
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            sessionApiKey = savedKey;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('grader-screen').style.display = 'flex';
        }

        // HANDLE AUTH LOGIN
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputKey = document.getElementById('api-key-input').value.trim();
            
            if (inputKey) {
                sessionApiKey = inputKey;
                localStorage.setItem('gemini_api_key', inputKey); // Save to browser memory
                
                document.getElementById('api-key-input').blur();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('grader-screen').style.display = 'flex';
            }
        });

        // HANDLE LOGOUT / CHANGE KEY
        document.getElementById('clear-key-link').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('gemini_api_key'); // Delete from memory
            sessionApiKey = "";
            document.getElementById('api-key-input').value = "";
            
            // Reset UI back to auth screen
            document.getElementById('grader-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            
            // Also reset the grader form just in case
            document.getElementById('paper-image').value = '';
            document.getElementById('result-section').style.display = 'none';
            document.querySelector('#grader-screen p.subtitle').style.display = 'block';
            document.getElementById('grader-form').style.display = 'block';
            document.getElementById('status').textContent = '';
        });

        // HANDLE NEW PAPER RESET
        document.getElementById('new-paper-btn').addEventListener('click', () => {
            document.getElementById('paper-image').value = '';
            document.getElementById('result-section').style.display = 'none';
            document.querySelector('#grader-screen p.subtitle').style.display = 'block';
            document.getElementById('grader-form').style.display = 'block';
            document.getElementById('status').textContent = '';
        });

        // HANDLE GRADING SUBMISSION
        document.getElementById('grader-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('paper-image');
            const statusText = document.getElementById('status');
            const submitBtn = document.getElementById('submit-btn');
            const resultSection = document.getElementById('result-section');
            
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);
            formData.append('api_key', sessionApiKey);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            statusText.textContent = 'Analyzing and grading paper...';
            
            document.querySelector('#grader-screen p.subtitle').style.display = 'none';
            document.getElementById('grader-form').style.display = 'none';
            resultSection.style.display = 'none';

            try {
                const response = await fetch('/api/grade', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Grading failed: ${errorMsg}`);
                }

                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);

                document.getElementById('preview').src = imageUrl;
                document.getElementById('download-link').href = imageUrl;
                document.getElementById('preview').style.pointerEvents = 'auto';
                
                resultSection.style.display = 'flex';
                statusText.textContent = 'Grading complete!';
                
            } catch (error) {
                console.error(error);
                statusText.textContent = error.message;
                document.getElementById('grader-form').style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Grade Paper';
            }
        });
    </script>
</body>
</html>
