<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>AI Math Grader</title>
    <meta name="description" content="An automated AI teaching assistant for grading handwritten math assignments.">
    <meta name="author" content="Marwane Farhane">

    <link rel="icon" href="https://i.imgur.com/YOUR_IMAGE_ID.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/YOUR_IMAGE_ID.jpg">

    <style>
        :root {
            /* Premium Dark Theme Palette (Default) */
            --bg-color: #09090b; /* Zinc 950 */
            --container-bg: #18181b; /* Zinc 900 */
            --text-primary: #f4f4f5; /* Zinc 50 */
            --text-secondary: #a1a1aa; /* Zinc 400 */
            --border-color: #27272a; /* Zinc 800 */
            --border-hover: #3f3f46; /* Zinc 700 */
            --accent-color: #3b82f6; /* Blue 500 */
            --accent-hover: #2563eb; /* Blue 600 */
            --toggle-bg: #000000;
            --preview-bg: #000000;
            
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --font-stack: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Light Theme Palette Overrides */
        :root.light-theme {
            --bg-color: #f4f4f5; /* Zinc 50 */
            --container-bg: #ffffff; /* White */
            --text-primary: #09090b; /* Zinc 950 */
            --text-secondary: #52525b; /* Zinc 500 */
            --border-color: #e4e4e7; /* Zinc 200 */
            --border-hover: #d4d4d8; /* Zinc 300 */
            --toggle-bg: #ffffff;
            --preview-bg: #f4f4f5;
        }

        * {
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
            touch-action: none; 
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;

            /* DISABLE TEXT SELECTION GLOBALLY */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Standard */
        }

        /* RE-ENABLE SELECTION FOR INPUTS ONLY */
        input {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        /* --- SLEEK TOGGLE SWITCHES (Theme & Language) --- */
        .top-toggle {
            position: absolute;
            top: 24px;
            display: flex;
            background-color: var(--toggle-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .theme-toggle { left: 24px; }
        .lang-toggle { right: 24px; }

        .top-toggle button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--accent-color);
            border: none;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s ease;
            height: 28px; /* Ensures SVGs and Text share exact dimensions */
        }

        .top-toggle button:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .top-toggle button.active {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
        }

        /* SVG icon sizing for theme buttons */
        .top-toggle button svg {
            width: 14px;
            height: 14px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; 
            min-height: 0; 
        }

        /* --- PREMIUM CARD UI --- */
        .container {
            background-color: var(--container-bg);
            padding: 32px; 
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 440px;
            max-height: 85vh; 
            overflow-y: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            display: flex;
            flex-direction: column;
            transition: height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }
        
        .container::-webkit-scrollbar { display: none; }

        .container.result-mode {
            height: 100%;
            overflow: hidden;
        }

        /* Centered typography */
        h1 {
            margin-top: 16px; /* Added margin to clear toggles on mobile */
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            flex-shrink: 0;
            text-align: center; /* Changed to center */
            text-wrap: balance; 
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 28px;
            line-height: 1.5;
            flex-shrink: 0;
            text-align: center; /* Changed to center */
        }

        .form-group {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s ease;
        }

        input[type="password"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        input[type="file"] { display: none; }

        /* Modern Dropzone Style Upload */
        .custom-file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 32px 20px;
            background-color: var(--bg-color);
            border: 1.5px dashed var(--border-hover);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .custom-file-upload:hover, .custom-file-upload:active {
            border-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.03);
        }

        .upload-icon {
            color: var(--text-secondary);
            margin-bottom: 12px;
            transition: color 0.2s ease;
        }
        
        .custom-file-upload:hover .upload-icon {
            color: var(--accent-color);
        }

        .upload-btn-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .upload-file-name {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Standardized Premium Buttons */
        button.primary-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            outline: none; 
            transition: background-color 0.2s ease;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none; 
        }

        button.primary-btn:active, button.primary-btn:hover {
            background-color: var(--accent-hover); 
        }

        button.primary-btn:disabled {
            background-color: var(--border-hover);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        button.secondary-btn {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none; 
        }

        button.secondary-btn:active, button.secondary-btn:hover {
            background-color: var(--border-color); 
        }

        #status {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-color);
            text-align: center;
            flex-shrink: 0;
        }

        /* --- SNOWFLAKE ANIMATION --- */
        .loader-container {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .snowflake-icon {
            animation: spin 2s linear infinite;
            color: var(--accent-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #result-section {
            display: none;
            flex-direction: column;
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            flex: 1; 
            min-height: 0; 
            overflow: hidden; 
        }

        .preview-wrapper {
            flex: 1;
            min-height: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: var(--preview-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease;
        }

        img#preview {
            width: 100%;
            height: 100%; 
            object-fit: contain; 
            pointer-events: auto; 
        }

        #download-link {
            text-decoration: none; 
            display: block;
            flex-shrink: 0; 
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        #clear-key-link {
            color: var(--text-primary);
            text-decoration: none;
            margin: 0 8px;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        #clear-key-link:hover {
            color: var(--accent-color);
        }

        #grader-screen {
            display: none;
            width: 100%; 
        }
    </style>
</head>
<body>

    <div class="top-toggle theme-toggle">
        <button id="theme-btn-light" onclick="setTheme('light')" aria-label="Light Mode">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
        <button id="theme-btn-dark" class="active" onclick="setTheme('dark')" aria-label="Dark Mode">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <div class="top-toggle lang-toggle">
        <button id="lang-btn-en" class="active" onclick="setLanguage('EN')">EN</button>
        <button id="lang-btn-fr" onclick="setLanguage('FR')">FR</button>
    </div>

    <main>
        <div id="auth-screen" class="container">
            <h1 id="t-auth-title">Access Grader</h1>
            <p class="subtitle" id="t-auth-sub">Please provide your Gemini API key to access the tool. It will be saved securely on your device.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <input type="password" id="api-key-input" required placeholder="Enter Gemini API Key">
                </div>
                <button type="submit" class="primary-btn" id="t-auth-btn">Authenticate</button>
            </form>

            <p style="font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 16px; margin-bottom: 0;">
                <span id="t-no-key">Don't have a key? Get a free one in 1-click from</span> <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: var(--accent-color); text-decoration: none; font-weight: 500;">Google AI Studio</a>.
            </p>
        </div>

        <div id="grader-screen" class="container">
            <h1 id="t-grader-title">AI Math Grader</h1>
            <p class="subtitle" id="t-grader-sub">Upload a photo of handwritten math to evaluate it.</p>
            
            <form id="grader-form">
                <div class="form-group">
                    <label class="custom-file-upload">
                        <input type="file" id="paper-image" accept="image/*" required>
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="upload-icon">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span class="upload-btn-text" id="t-choose-file">Select Image File</span>
                        <span class="upload-file-name" id="file-name-display">No file chosen</span>
                    </label>
                </div>
                <button type="submit" class="primary-btn" id="submit-btn">Grade Paper</button>
            </form>

            <div id="loader-container" class="loader-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="snowflake-icon">
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <path d="m20 16-4-4 4-4"></path>
                    <path d="m4 8 4 4-4 4"></path>
                    <path d="m16 4-4 4-4-4"></path>
                    <path d="m8 20 4-4 4 4"></path>
                </svg>
            </div>

            <div id="status"></div>

            <div id="result-section">
                <div class="preview-wrapper">
                    <img id="preview" alt="Graded Paper Preview">
                </div>
                <a id="download-link" download="graded_paper.jpg">
                    <button type="button" class="primary-btn" id="t-download-btn">Download Corrected Paper</button>
                </a>
                <button type="button" id="new-paper-btn" class="secondary-btn">Grade Another Paper</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Marwane Farhane <a href="#" id="clear-key-link">Change API Key</a>
    </footer>

    <script>
        document.addEventListener('touchmove', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('gesturestart', function(event) { event.preventDefault(); });

        /* --- THEME LOGIC --- */
        function setTheme(theme) {
            document.getElementById('theme-btn-light').classList.remove('active');
            document.getElementById('theme-btn-dark').classList.remove('active');
            
            if (theme === 'light') {
                document.documentElement.classList.add('light-theme');
                document.getElementById('theme-btn-light').classList.add('active');
            } else {
                document.documentElement.classList.remove('light-theme');
                document.getElementById('theme-btn-dark').classList.add('active');
            }
            localStorage.setItem('user_theme', theme);
        }

        const savedTheme = localStorage.getItem('user_theme') || 'dark';
        setTheme(savedTheme);

        /* --- LANGUAGE LOGIC --- */
        const uiText = {
            EN: {
                authTitle: "Access Grader",
                authSub: "Please provide your Gemini API key to access the tool. It will be saved securely on your device.",
                keyPlace: "Enter Gemini API Key",
                authBtn: "Authenticate",
                graderTitle: "AI Math Grader",
                graderSub: "Upload a photo of handwritten math to evaluate it.",
                chooseFile: "Select Image File",
                noFile: "No file chosen",
                gradeBtn: "Grade Paper",
                downloadBtn: "Download Corrected Paper",
                newPaperBtn: "Grade Another Paper",
                changeKey: "Change API Key",
                statusProcess: "Processing...",
                statusAnalyze: "Analyzing and grading paper...",
                statusComplete: "Grading complete!",
                noKey: "Don't have a key? Get a free one in 1-click from"
            },
            FR: {
                authTitle: "Accès au Correcteur",
                authSub: "Veuillez fournir votre clé API Gemini. Elle sera enregistrée en toute sécurité sur votre appareil.",
                keyPlace: "Entrez la clé API Gemini",
                authBtn: "S'authentifier",
                graderTitle: "Correcteur Math. IA",
                graderSub: "Téléchargez une photo de mathématiques manuscrites pour l'évaluer.",
                chooseFile: "Sélectionner une Image",
                noFile: "Aucun fichier choisi",
                gradeBtn: "Corriger la Copie",
                downloadBtn: "Télécharger la Copie Corrigée",
                newPaperBtn: "Corriger une Autre Copie",
                changeKey: "Changer la clé API",
                statusProcess: "Traitement en cours...",
                statusAnalyze: "Analyse et correction en cours...",
                statusComplete: "Correction terminée !",
                noKey: "Vous n'avez pas de clé ? Obtenez-en une gratuite sur"
            }
        };

        let currentLang = "EN";
        const fileInput = document.getElementById('paper-image');
        const fileNameDisplay = document.getElementById('file-name-display');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = this.files[0].name;
            } else {
                fileNameDisplay.textContent = uiText[currentLang].noFile;
            }
        });

        function setLanguage(lang) {
            currentLang = lang;
            const t = uiText[lang];
            
            document.getElementById('lang-btn-en').classList.remove('active');
            document.getElementById('lang-btn-fr').classList.remove('active');
            document.getElementById(`lang-btn-${lang.toLowerCase()}`).classList.add('active');
            
            document.documentElement.lang = lang.toLowerCase();

            document.getElementById('t-auth-title').textContent = t.authTitle;
            document.getElementById('t-auth-sub').textContent = t.authSub;
            document.getElementById('api-key-input').placeholder = t.keyPlace;
            document.getElementById('t-auth-btn').textContent = t.authBtn;
            document.getElementById('t-no-key').textContent = t.noKey;
            
            document.getElementById('t-grader-title').textContent = t.graderTitle;
            document.getElementById('t-grader-sub').textContent = t.graderSub;
            
            document.getElementById('t-choose-file').textContent = t.chooseFile;
            if (!fileInput.files || fileInput.files.length === 0) {
                fileNameDisplay.textContent = t.noFile;
            }
            
            const sBtn = document.getElementById('submit-btn');
            if(sBtn.disabled === false) sBtn.textContent = t.gradeBtn;
            
            document.getElementById('t-download-btn').textContent = t.downloadBtn;
            document.getElementById('new-paper-btn').textContent = t.newPaperBtn;
            document.getElementById('clear-key-link').textContent = t.changeKey;
        }

        /* --- AUTH & GRADER LOGIC --- */
        let sessionApiKey = "";
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            sessionApiKey = savedKey;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('grader-screen').style.display = 'flex';
        }

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputKey = document.getElementById('api-key-input').value.trim();
            if (inputKey) {
                sessionApiKey = inputKey;
                localStorage.setItem('gemini_api_key', inputKey);
                document.getElementById('api-key-input').blur();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('grader-screen').style.display = 'flex';
            }
        });

        function resetGraderUI() {
            fileInput.value = '';
            fileNameDisplay.textContent = uiText[currentLang].noFile;
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('loader-container').style.display = 'none';
            document.querySelector('#grader-screen p.subtitle').style.display = 'block';
            document.getElementById('grader-form').style.display = 'block';
            document.getElementById('status').textContent = '';
            document.getElementById('grader-screen').classList.remove('result-mode');
        }

        document.getElementById('clear-key-link').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('gemini_api_key'); 
            sessionApiKey = "";
            document.getElementById('api-key-input').value = "";
            document.getElementById('grader-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            resetGraderUI();
        });

        document.getElementById('new-paper-btn').addEventListener('click', () => {
            resetGraderUI();
        });

        document.getElementById('grader-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const statusText = document.getElementById('status');
            const submitBtn = document.getElementById('submit-btn');
            const resultSection = document.getElementById('result-section');
            const loaderContainer = document.getElementById('loader-container');
            const graderScreen = document.getElementById('grader-screen');
            
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);
            formData.append('api_key', sessionApiKey);
            formData.append('language', currentLang); 

            submitBtn.disabled = true;
            submitBtn.textContent = uiText[currentLang].statusProcess;
            statusText.textContent = uiText[currentLang].statusAnalyze;
            
            document.querySelector('#grader-screen p.subtitle').style.display = 'none';
            document.getElementById('grader-form').style.display = 'none';
            resultSection.style.display = 'none';
            
            loaderContainer.style.display = 'flex';

            try {
                const response = await fetch('/api/grade', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Grading failed: ${errorMsg}`);
                }

                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);

                document.getElementById('preview').src = imageUrl;
                document.getElementById('download-link').href = imageUrl;
                
                loaderContainer.style.display = 'none';
                resultSection.style.display = 'flex';
                statusText.textContent = uiText[currentLang].statusComplete;
                
                graderScreen.classList.add('result-mode');
                
            } catch (error) {
                console.error(error);
                statusText.textContent = error.message;
                loaderContainer.style.display = 'none';
                document.getElementById('grader-form').style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = uiText[currentLang].gradeBtn;
            }
        });
    </script>
</body>
</html>
