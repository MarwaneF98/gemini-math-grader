<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>AI Math Grader</title>
    <meta name="description" content="An automated AI teaching assistant for grading handwritten math assignments.">
    <meta name="author" content="Marwane Farhane">

    <link rel="icon" href="https://i.imgur.com/YOUR_IMAGE_ID.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/YOUR_IMAGE_ID.jpg">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gemini-math-grader.vercel.app/">
    <meta property="og:title" content="AI Math Grader">
    <meta property="og:description" content="An automated AI teaching assistant for grading handwritten math assignments.">
    <meta property="og:image" content="https://i.imgur.com/YOUR_IMAGE_ID.jpg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://gemini-math-grader.vercel.app/">
    <meta name="twitter:title" content="AI Math Grader">
    <meta name="twitter:description" content="An automated AI teaching assistant for grading handwritten math assignments.">
    <meta name="twitter:image" content="https://i.imgur.com/YOUR_IMAGE_ID.jpg">

    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-color: #2563eb; 
        }

        * {
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
            touch-action: none; 
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            display: flex;
            flex-direction: column;
        }

        /* --- SLEEK LANGUAGE TOGGLE --- */
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            z-index: 100;
        }

        .lang-toggle button {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: auto;
            border-radius: 0;
            transition: all 0.2s ease;
        }

        .lang-toggle button.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }
        /* ------------------------------ */

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden; 
            min-height: 0; 
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px 24px; 
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            max-height: 85vh; 
            display: flex;
            flex-direction: column;
            margin: auto; 
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 8px;
            flex-shrink: 0;
            text-align: center; 
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.4;
            flex-shrink: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
            flex-shrink: 0;
            text-align: left; 
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-size: 16px; 
            outline: none; 
        }

        input[type="password"]:focus {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            display: none; 
        }

        .custom-file-upload {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .custom-file-upload:active {
            border-color: var(--accent-color);
        }

        .upload-btn-text {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .upload-file-name {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 60%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button.primary-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            outline: none; 
            flex-shrink: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        button.primary-btn:active {
            background-color: #1d4ed8; 
        }

        button.primary-btn:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }

        button.secondary-btn {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            flex-shrink: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        button.secondary-btn:active {
            background-color: rgba(37, 99, 235, 0.1); 
        }

        #status {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            flex-shrink: 0;
        }

        #result-section {
            display: none;
            flex-direction: column;
            margin-top: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            flex: 1; 
            min-height: 0; 
            overflow: hidden;
        }

        img#preview {
            width: 100%;
            flex: 1; 
            min-height: 0; 
            object-fit: contain; 
            border-radius: 4px;
            margin-bottom: 16px;
            pointer-events: none; 
        }

        #download-link {
            text-decoration: none; 
            display: block;
            flex-shrink: 0; 
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            background-color: var(--container-bg);
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        #clear-key-link {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 8px;
            cursor: pointer;
        }

        #grader-screen {
            display: none;
            width: 100%; 
        }
    </style>
</head>
<body>

    <div class="lang-toggle">
        <button id="lang-btn-en" class="active" onclick="setLanguage('EN')">EN</button>
        <button id="lang-btn-fr" onclick="setLanguage('FR')">FR</button>
    </div>

    <main>
        <div id="auth-screen" class="container">
            <h1 id="t-auth-title">Access Grader</h1>
            <p class="subtitle" id="t-auth-sub">Please provide your Gemini API key to access the tool. It will be saved securely on your device.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <input type="password" id="api-key-input" required placeholder="Enter Gemini API Key">
                </div>
                <button type="submit" class="primary-btn" id="t-auth-btn">Enter</button>
            </form>
        </div>

        <div id="grader-screen" class="container">
            <h1 id="t-grader-title">AI Math Grader</h1>
            <p class="subtitle" id="t-grader-sub">Upload a photo of handwritten math to grade it.</p>
            
            <form id="grader-form">
                <div class="form-group">
                    <label class="custom-file-upload">
                        <input type="file" id="paper-image" accept="image/*" required>
                        <span class="upload-btn-text" id="t-choose-file">Choose File</span>
                        <span class="upload-file-name" id="file-name-display">No file chosen</span>
                    </label>
                </div>
                <button type="submit" class="primary-btn" id="submit-btn">Grade Paper</button>
            </form>

            <div id="status"></div>

            <div id="result-section">
                <img id="preview" alt="Graded Paper Preview">
                <a id="download-link" download="graded_paper.jpg">
                    <button type="button" class="primary-btn" id="t-download-btn">Download Corrected Paper</button>
                </a>
                <button type="button" id="new-paper-btn" class="secondary-btn">Grade Another Paper</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Marwane Farhane. <a href="#" id="clear-key-link">Change API Key</a>
    </footer>

    <script>
        document.addEventListener('touchmove', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('gesturestart', function(event) { event.preventDefault(); });

        // --- TRANSLATION DICTIONARY (EN & FR ONLY) ---
        const uiText = {
            EN: {
                authTitle: "Access Grader",
                authSub: "Please provide your Gemini API key to access the tool. It will be saved securely on your device.",
                keyPlace: "Enter Gemini API Key",
                authBtn: "Enter",
                graderTitle: "AI Math Grader",
                graderSub: "Upload a photo of handwritten math to grade it.",
                chooseFile: "Choose File",
                noFile: "No file chosen",
                gradeBtn: "Grade Paper",
                downloadBtn: "Download Corrected Paper",
                newPaperBtn: "Grade Another Paper",
                changeKey: "Change API Key",
                statusProcess: "Processing...",
                statusAnalyze: "Analyzing and grading paper...",
                statusComplete: "Grading complete!"
            },
            FR: {
                authTitle: "Accès au Correcteur",
                authSub: "Veuillez fournir votre clé API Gemini. Elle sera enregistrée en toute sécurité sur votre appareil.",
                keyPlace: "Entrez la clé API Gemini",
                authBtn: "Entrer",
                graderTitle: "Correcteur Mathématique IA",
                graderSub: "Téléchargez une photo de mathématiques manuscrites pour la corriger.",
                chooseFile: "Choisir un fichier",
                noFile: "Aucun fichier choisi",
                gradeBtn: "Corriger la Copie",
                downloadBtn: "Télécharger la Copie Corrigée",
                newPaperBtn: "Corriger une Autre Copie",
                changeKey: "Changer la clé API",
                statusProcess: "Traitement en cours...",
                statusAnalyze: "Analyse et correction en cours...",
                statusComplete: "Correction terminée !"
            }
        };

        let currentLang = "EN";
        const fileInput = document.getElementById('paper-image');
        const fileNameDisplay = document.getElementById('file-name-display');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = this.files[0].name;
            } else {
                fileNameDisplay.textContent = uiText[currentLang].noFile;
            }
        });

        function setLanguage(lang) {
            currentLang = lang;
            const t = uiText[lang];
            
            // Update button styles
            document.getElementById('lang-btn-en').classList.remove('active');
            document.getElementById('lang-btn-fr').classList.remove('active');
            document.getElementById(`lang-btn-${lang.toLowerCase()}`).classList.add('active');
            
            document.documentElement.lang = lang.toLowerCase();

            document.getElementById('t-auth-title').textContent = t.authTitle;
            document.getElementById('t-auth-sub').textContent = t.authSub;
            document.getElementById('api-key-input').placeholder = t.keyPlace;
            document.getElementById('t-auth-btn').textContent = t.authBtn;
            
            document.getElementById('t-grader-title').textContent = t.graderTitle;
            document.getElementById('t-grader-sub').textContent = t.graderSub;
            
            document.getElementById('t-choose-file').textContent = t.chooseFile;
            if (!fileInput.files || fileInput.files.length === 0) {
                fileNameDisplay.textContent = t.noFile;
            }
            
            const sBtn = document.getElementById('submit-btn');
            if(sBtn.disabled === false) sBtn.textContent = t.gradeBtn;
            
            document.getElementById('t-download-btn').textContent = t.downloadBtn;
            document.getElementById('new-paper-btn').textContent = t.newPaperBtn;
            document.getElementById('clear-key-link').textContent = t.changeKey;
        }

        // Initialize Core Logic
        let sessionApiKey = "";
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            sessionApiKey = savedKey;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('grader-screen').style.display = 'flex';
        }

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputKey = document.getElementById('api-key-input').value.trim();
            if (inputKey) {
                sessionApiKey = inputKey;
                localStorage.setItem('gemini_api_key', inputKey);
                document.getElementById('api-key-input').blur();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('grader-screen').style.display = 'flex';
            }
        });

        document.getElementById('clear-key-link').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('gemini_api_key'); 
            sessionApiKey = "";
            document.getElementById('api-key-input').value = "";
            document.getElementById('grader-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            
            fileInput.value = '';
            fileNameDisplay.textContent = uiText[currentLang].noFile;
            document.getElementById('result-section').style.display = 'none';
            document.querySelector('#grader-screen p.subtitle').style.display = 'block';
            document.getElementById('grader-form').style.display = 'block';
            document.getElementById('status').textContent = '';
        });

        document.getElementById('new-paper-btn').addEventListener('click', () => {
            fileInput.value = '';
            fileNameDisplay.textContent = uiText[currentLang].noFile;
            document.getElementById('result-section').style.display = 'none';
            document.querySelector('#grader-screen p.subtitle').style.display = 'block';
            document.getElementById('grader-form').style.display = 'block';
            document.getElementById('status').textContent = '';
        });

        document.getElementById('grader-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const statusText = document.getElementById('status');
            const submitBtn = document.getElementById('submit-btn');
            const resultSection = document.getElementById('result-section');
            
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);
            formData.append('api_key', sessionApiKey);
            formData.append('language', currentLang); 

            submitBtn.disabled = true;
            submitBtn.textContent = uiText[currentLang].statusProcess;
            statusText.textContent = uiText[currentLang].statusAnalyze;
            
            document.querySelector('#grader-screen p.subtitle').style.display = 'none';
            document.getElementById('grader-form').style.display = 'none';
            resultSection.style.display = 'none';

            try {
                const response = await fetch('/api/grade', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Grading failed: ${errorMsg}`);
                }

                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);

                document.getElementById('preview').src = imageUrl;
                document.getElementById('download-link').href = imageUrl;
                document.getElementById('preview').style.pointerEvents = 'auto';
                
                resultSection.style.display = 'flex';
                statusText.textContent = uiText[currentLang].statusComplete;
                
            } catch (error) {
                console.error(error);
                statusText.textContent = error.message;
                document.getElementById('grader-form').style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = uiText[currentLang].gradeBtn;
            }
        });
    </script>
</body>
</html>
